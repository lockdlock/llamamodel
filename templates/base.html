<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LlamaModel,{% endblock %}</title>
  <style>
    :root { --bg: #1a1b26; --fg: #c0caf5; --muted: #565f89; --accent: #7aa2f7; --card: #24283b; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--fg); margin: 0; min-height: 100vh; }
    nav { background: var(--card); padding: 0.75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; justify-content: space-between; }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: var(--accent); text-decoration: none; padding-bottom: 0.2rem; }
    nav a:hover { text-decoration: underline; }
    nav a.active-nav { border-bottom: 2px solid var(--accent); font-weight: bold; }
    .app-brand { display: flex; align-items: center; gap: 0.5rem; font-weight: bold; font-size: 1.1rem; color: var(--fg); }
    .app-brand svg { width: 24px; height: 24px; fill: var(--accent); }
    .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.5rem; margin-top: 0; }
    a { color: var(--accent); }
    input[type="text"], input[type="number"], select, textarea { background: var(--card); color: var(--fg); border: 1px solid var(--muted); padding: 0.5rem; border-radius: 4px; }
    button, .btn { background: var(--accent); color: var(--bg); border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 1rem; }
    button:hover, .btn:hover { opacity: 0.9; }
    .btn-secondary { background: var(--muted); color: var(--fg); }
    .card { background: var(--card); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .muted { color: var(--muted); font-size: 0.9rem; }
    pre, code { background: var(--card); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9rem; }
    pre { overflow-x: auto; white-space: pre-wrap; }
  </style>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <div class="nav-links">
      <a href="/models" class="{% if request.url.path.startswith('/models') %}active-nav{% endif %}">My Models</a>
      <a href="/discover" class="{% if request.url.path.startswith('/discover') %}active-nav{% endif %}">Discover</a>
      <a href="/settings" class="{% if request.url.path.startswith('/settings') %}active-nav{% endif %}">Settings</a>
    </div>
    <div class="app-brand">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 12c-1.1-1.34-2.8-2.1-4.75-2.22-.05-1.92-1.42-3.53-3.23-3.76A3.996 3.996 0 0 0 7.5 3a4 4 0 0 0-4 4c0 1.93 1.37 3.53 3.16 3.9L6 14h1.5l1.63-8h1.76l2.11 8H15c.03-1.63.74-3.08 1.83-4.04C15.82 9.27 15 8.18 15 7c0-1.66 1.34-3 3-3s3 1.34 3 3-1.34 3-3 3c-.02 0-.04 0-.06-.01.55.5 1.01 1.1 1.32 1.77L19.26 12H19zM7.5 5c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM18 9c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm0 6h-2.5l-2.02-7.69c.81.42 1.48 1.05 1.93 1.82.02.04.05.07.07.1L16.29 13H14v2h4v-2h-3v-1.12c.59.07 1.11.23 1.57.48L18.15 15H21v5c0 1.1-.9 2-2 2h-6c-1.1 0-2-.9-2-2v-5h3l-.38-1.52c-.67-.34-1.46-.53-2.31-.53h-.06l-1.3 4.96h-1.6l-1.64 4.54-6.3-1.52L5.86 16h4.52l.96-3.83L9 6.27C9.37 6.01 9.69 5.67 9.94 5.29L12 13h1.71l-1.92-7.29c.7-.1 1.4-.04 2.05.15L15 11h2.24l.58-2h.18z"/>
      </svg>
      LlamaModel
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  {% block script %}{% endblock %}
</body>
</html>
